<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        #login-screen {
            position: fixed;
            inset: 0;
            background: #050505;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: #09090b;
            border: 1px solid #1d4ed8;
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(29, 78, 216, 0.25);
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-input {
            background: #050505;
            border: 1px solid #27272a;
            color: white;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        .login-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .login-btn {
            background: #2563eb;
            color: white;
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            cursor: pointer;
        }
        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        #main-ui {
            display: none;
        }
        .game-card {
            transition: transform 0.2s;
            position: relative;
        }
        .game-card:hover {
            transform: scale(1.02);
        }
        .game-card .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .game-card:hover .overlay {
            opacity: 1;
            pointer-events: auto;
        }
        .play-btn {
            background: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: none;
            cursor: pointer;
        }
        .play-btn:hover {
            transform: scale(1.15);
            background: #2563eb;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .play-btn:active {
            transform: scale(0.95);
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
        }
        #game-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 1000;
        }
        .chat-panel {
            position: fixed;
            right: -350px;
            top: 0;
            width: 350px;
            height: 100vh;
            background: #09090b;
            border-left: 1px solid #27272a;
            z-index: 50;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }
        .chat-panel.open {
            right: 0;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .chat-input-container {
            padding: 1rem;
            border-top: 1px solid #27272a;
            background: #0c0c0e;
        }
        .message-bubble {
            background: #18181b;
            padding: 0.75rem;
            border-radius: 1rem;
            max-width: 85%;
            animation: slideIn 0.2s ease-out;
        }
        .message-bubble.mine {
            align-self: flex-end;
            background: #2563eb;
            border-bottom-right-radius: 0.25rem;
        }
        .message-bubble.others {
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
        }
        .message-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
            position: relative;
        }
        .delete-btn {
            font-size: 9px;
            color: #ef4444;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.05em;
            margin-top: 2px;
            padding: 2px 4px;
        }
        .message-container:hover .delete-btn {
            opacity: 1;
        }
        .delete-btn.disabled {
            display: none;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-toggle {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 60;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .chat-toggle:hover {
            transform: scale(1.1);
            background: #3b82f6;
        }
        .chat-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            border: 2px solid #09090b;
        }
    </style>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black tracking-tighter mb-2">Nexus<span class="text-blue-500">Games</span></h1>
                <p class="text-zinc-500 text-sm">Please sign in to continue</p>
            </div>
            <div id="login-error" class="hidden bg-red-500/10 border border-red-500/50 text-red-500 text-xs p-3 rounded-lg mb-4 text-center">
                Invalid username or password
            </div>
            <input type="text" id="login-user" placeholder="Username" class="login-input">
            <input type="password" id="login-pass" placeholder="Password" class="login-input">
            <button onclick="handleLogin()" class="login-btn">Sign In</button>
            <p class="text-center mt-6 text-[10px] text-zinc-600 uppercase tracking-widest">Authorized Personnel Only</p>
        </div>
    </div>

    <div id="main-ui">
        <header class="bg-black p-6 border-b border-blue-500/20 shadow-xl">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <h1 class="text-3xl font-black tracking-tighter">Nexus<span class="text-blue-500">Games</span></h1>
                <div class="flex items-center gap-4">
                    <input type="text" id="search" placeholder="Search games..." oninput="render()" class="bg-zinc-900 border border-zinc-800 px-4 py-2 rounded-lg focus:outline-none focus:border-blue-500 text-white">
                    <button onclick="handleLogout()" class="text-zinc-500 hover:text-white transition-colors p-2" title="Logout">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-8">
            <div id="featured-section" class="mb-12 hidden">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="star" class="text-yellow-400 fill-yellow-400"></i>
                    FEATURED GAME
                </h2>
                <div id="featured-game" class="w-full"></div>
            </div>

            <div id="categories" class="flex flex-wrap gap-2 mb-8">
                <!-- Categories here -->
            </div>

            <h2 class="text-xl font-bold mb-6 text-zinc-400 uppercase tracking-widest text-sm" id="section-title">All Games</h2>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Games here -->
            </div>
        </main>
    </div>

    <div id="game-container">
        <div class="absolute top-4 left-4 z-50 flex gap-2">
            <button onclick="closeGame()" class="bg-zinc-900/80 hover:bg-zinc-900 p-3 rounded-full text-blue-500 backdrop-blur-sm transition-all hover:scale-110 active:scale-95" title="Close Game">
                <i data-lucide="arrow-left"></i>
            </button>
            <button onclick="reloadGame()" class="bg-zinc-900/80 hover:bg-zinc-900 p-3 rounded-full text-blue-500 backdrop-blur-sm transition-all hover:scale-110 active:scale-95" title="Reload Game">
                <i data-lucide="refresh-cw"></i>
            </button>
        </div>
        <iframe id="game-iframe" src=""></iframe>
    </div>

    <div id="chat-panel" class="chat-panel">
        <div class="p-4 border-b border-zinc-800 flex items-center justify-between bg-zinc-900/50">
            <div class="flex items-center gap-2">
                <i data-lucide="message-square" class="text-blue-500 w-5 h-5"></i>
                <h2 class="font-bold text-white">Live Chat</h2>
            </div>
            <button onclick="toggleChat()" class="text-zinc-500 hover:text-white transition-colors">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="chat-messages" class="chat-messages">
            <!-- Messages will appear here -->
        </div>
        <div class="chat-input-container">
            <div class="flex gap-2">
                <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-500 text-white p-2 rounded-lg transition-colors">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="chat-toggle" class="chat-toggle" onclick="toggleChat()">
        <i data-lucide="message-circle" class="w-6 h-6"></i>
        <div id="chat-badge" class="chat-badge hidden">0</div>
    </div>

    <script>
        // Socket.io setup
        const socket = io();
        let unreadCount = 0;
        let isChatOpen = false;
        let myUsername = localStorage.getItem('nexus_user_name') || 'Guest';

        socket.on('chat_history', (messages) => {
            const container = document.getElementById('chat-messages');
            container.innerHTML = '';
            messages.forEach(addMessageToUI);
            scrollToBottom();
        });

        socket.on('new_message', (msg) => {
            addMessageToUI(msg);
            if (!isChatOpen) {
                unreadCount++;
                updateBadge();
            }
            scrollToBottom();
        });

        socket.on('message_deleted', (id) => {
            const el = document.getElementById(`msg-${id}`);
            if (el) el.remove();
        });

        function addMessageToUI(msg) {
            const container = document.getElementById('chat-messages');
            const wrapper = document.createElement('div');
            const isMine = msg.user === myUsername;
            
            wrapper.id = `msg-${msg.id}`;
            wrapper.className = `message-container ${isMine ? 'items-end' : 'items-start'}`;
            
            const now = Date.now();
            const canDelete = isMine && (now - msg.timestamp <= 10000);

            wrapper.innerHTML = `
                <div class="message-bubble ${isMine ? 'mine' : 'others'}">
                    <div class="flex justify-between items-baseline mb-1 gap-4">
                        <span class="text-[10px] font-bold ${isMine ? 'text-blue-100' : 'text-blue-400'} uppercase tracking-wider">${isMine ? 'You' : msg.user}</span>
                        <span class="text-[9px] ${isMine ? 'text-blue-200' : 'text-zinc-500'}">${msg.time}</span>
                    </div>
                    <p class="text-sm ${isMine ? 'text-white' : 'text-zinc-200'}">${msg.text}</p>
                </div>
                ${isMine ? `<button id="del-${msg.id}" onclick="deleteMessage('${msg.id}')" class="delete-btn ${!canDelete ? 'disabled' : ''}">Delete</button>` : ''}
            `;
            
            container.appendChild(wrapper);

            // Set a timer to hide the delete button after 10 seconds
            if (canDelete) {
                const timeLeft = 10000 - (now - msg.timestamp);
                setTimeout(() => {
                    const btn = document.getElementById(`del-${msg.id}`);
                    if (btn) btn.classList.add('disabled');
                }, timeLeft);
            }
        }

        function deleteMessage(id) {
            socket.emit('delete_message', id);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (text) {
                socket.emit('send_message', {
                    user: myUsername,
                    text: text
                });
                input.value = '';
            }
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        function toggleChat() {
            const panel = document.getElementById('chat-panel');
            isChatOpen = !isChatOpen;
            panel.classList.toggle('open', isChatOpen);
            
            if (isChatOpen) {
                unreadCount = 0;
                updateBadge();
                setTimeout(scrollToBottom, 300);
            }
        }

        function updateBadge() {
            const badge = document.getElementById('chat-badge');
            if (unreadCount > 0) {
                badge.innerText = unreadCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function scrollToBottom() {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        }

        // Login Logic
        function checkAuth() {
            const isLoggedIn = localStorage.getItem('nexus_logged_in') === 'true';
            if (isLoggedIn) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                render();
            }
        }

        function handleLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const error = document.getElementById('login-error');

            if (user === 'kyler' && pass === 'k') {
                localStorage.setItem('nexus_logged_in', 'true');
                localStorage.setItem('nexus_user_name', user);
                myUsername = user;
                document.getElementById('login-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'block';
                    render();
                }, 300);
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        }

        function handleLogout() {
            localStorage.removeItem('nexus_logged_in');
            localStorage.removeItem('nexus_user_name');
            location.reload();
        }

        // Listen for enter key on login
        document.getElementById('login-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // Initialize votes from localStorage or default to 0
        const savedVotes = JSON.parse(localStorage.getItem('nexus_votes') || '{}');
        const userVotes = JSON.parse(localStorage.getItem('nexus_user_votes') || '{}');

        const GAMES = [
            { title: 'Basket Random', category: 'Sports', url: 'https://www.twoplayergames.org/gameframe/basket-random', img: 'https://i.ibb.co/Zp4gNTsb/basket-random.png' },
            { title: 'Soccer Random', category: 'Sports', url: 'https://www.twoplayergames.org/gameframe/soccer-random', img: 'https://picsum.photos/seed/soccer/400/250' },
            { title: 'Boxing Random', category: 'Sports', url: 'https://www.twoplayergames.org/gameframe/boxing-random', img: 'https://picsum.photos/seed/boxing/400/250' },
            { title: 'Retro Bowl', category: 'Sports', url: 'https://www.twoplayergames.org/gameframe/retro-bowl', img: 'https://picsum.photos/seed/retro/400/250' },
            { title: 'BitLife', category: 'Simulation', url: 'https://www.twoplayergames.org/gameframe/bitlife', img: 'https://picsum.photos/seed/bitlife/400/250' },
            { title: '1v1.lol', category: 'Action', url: 'https://www.twoplayergames.org/gameframe/1v1-lol', img: 'https://picsum.photos/seed/1v1/400/250' },
            { title: 'Slope', category: 'Action', url: 'https://www.twoplayergames.org/gameframe/slope', img: 'https://picsum.photos/seed/slope/400/250' },
            { title: 'Tunnel Rush', category: 'Action', url: 'https://www.twoplayergames.org/gameframe/tunnel-rush', img: 'https://picsum.photos/seed/tunnel/400/250' },
            { title: 'Drift Hunters', category: 'Driving', url: 'https://www.twoplayergames.org/gameframe/drift-hunters', img: 'https://picsum.photos/seed/drift/400/250' },
            { title: 'Moto X3M', category: 'Sports', url: 'https://www.twoplayergames.org/gameframe/moto-x3m', img: 'https://picsum.photos/seed/moto/400/250' }
        ].map(g => ({ ...g, votes: savedVotes[g.title] || 0 }));

        const CATEGORIES = ['All', ...new Set(GAMES.map(g => g.category))];
        let currentCategory = 'All';
        let currentUrl = '';

        function render() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('grid');
            const featuredSection = document.getElementById('featured-section');
            const featuredGameContainer = document.getElementById('featured-game');
            const categoriesContainer = document.getElementById('categories');
            const sectionTitle = document.getElementById('section-title');

            // Render Categories
            categoriesContainer.innerHTML = CATEGORIES.map(cat => `
                <button onclick="setCategory('${cat}')" class="px-4 py-2 rounded-full text-sm font-bold transition-all ${currentCategory === cat ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'bg-zinc-900 text-zinc-400 hover:bg-zinc-800'}">
                    ${cat}
                </button>
            `).join('');

            sectionTitle.innerText = currentCategory === 'All' ? 'All Games' : `${currentCategory} Games`;

            // Find featured game (highest votes, must be > 0)
            const sortedByVotes = [...GAMES].sort((a, b) => b.votes - a.votes);
            const topGame = sortedByVotes[0];

            if (topGame && topGame.votes > 0 && !query && currentCategory === 'All') {
                const userVote = userVotes[topGame.title] || 0;
                featuredSection.classList.remove('hidden');
                featuredGameContainer.innerHTML = `
                    <div class="game-card bg-zinc-900 rounded-2xl overflow-hidden border border-blue-500/30 group flex flex-col md:flex-row h-auto md:h-64 shadow-2xl shadow-blue-500/10">
                        <div class="relative w-full md:w-1/2 h-48 md:h-full">
                            <img src="${topGame.img}" class="w-full h-full object-cover" referrerPolicy="no-referrer">
                            <div class="overlay">
                                <button class="play-btn" onclick="play('${topGame.url}')">Play Featured Game</button>
                            </div>
                        </div>
                        <div class="p-8 flex flex-col justify-center flex-1 bg-gradient-to-br from-zinc-900 to-black">
                            <div class="flex justify-between items-start mb-4">
                                <div>
                                    <span class="text-blue-500 text-xs font-bold tracking-widest uppercase mb-2 block">Top Rated • ${topGame.category}</span>
                                    <h3 class="text-3xl font-black tracking-tight text-white">${topGame.title}</h3>
                                </div>
                                <div class="flex flex-col items-center bg-zinc-800/50 p-3 rounded-xl border border-zinc-700">
                                    <button onclick="vote('${topGame.title}', 1)" class="${userVote === 1 ? 'text-blue-500' : 'text-zinc-400'} hover:text-blue-500 transition-colors">
                                        <i data-lucide="chevron-up" class="w-6 h-6"></i>
                                    </button>
                                    <span class="font-bold text-xl text-blue-400 my-1">${topGame.votes}</span>
                                    <button onclick="vote('${topGame.title}', -1)" class="${userVote === -1 ? 'text-red-500' : 'text-zinc-400'} hover:text-red-500 transition-colors">
                                        <i data-lucide="chevron-down" class="w-6 h-6"></i>
                                    </button>
                                </div>
                            </div>
                            <p class="text-zinc-400 text-sm mb-6 line-clamp-2">The community's current favorite. Jump in and see why everyone is playing ${topGame.title}!</p>
                            <button onclick="play('${topGame.url}')" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-6 rounded-xl transition-all w-fit flex items-center gap-2">
                                <i data-lucide="play" class="fill-current w-4 h-4"></i>
                                PLAY NOW
                            </button>
                        </div>
                    </div>
                `;
            } else {
                featuredSection.classList.add('hidden');
            }

            const filteredGames = GAMES.filter(g => {
                const matchesSearch = g.title.toLowerCase().includes(query);
                const matchesCategory = currentCategory === 'All' || g.category === currentCategory;
                return matchesSearch && matchesCategory;
            });
            
            grid.innerHTML = filteredGames.map((g, index) => {
                const userVote = userVotes[g.title] || 0;
                return `
                <div class="game-card bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800 hover:border-blue-500 group">
                    <div class="relative">
                        <img src="${g.img}" class="w-full h-40 object-cover" referrerPolicy="no-referrer">
                        <div class="overlay">
                            <button class="play-btn" onclick="play('${g.url}')">Play Game</button>
                        </div>
                        <div class="absolute top-2 left-2">
                            <span class="bg-black/60 backdrop-blur-md text-[10px] font-bold px-2 py-1 rounded text-blue-400 border border-blue-500/20 uppercase tracking-tighter">${g.category}</span>
                        </div>
                    </div>
                    <div class="p-4 flex items-center justify-between">
                        <h3 class="font-bold text-zinc-100 truncate mr-2">${g.title}</h3>
                        <div class="flex items-center gap-2 bg-black/40 px-2 py-1 rounded-lg border border-zinc-800">
                            <button onclick="vote('${g.title}', 1)" class="${userVote === 1 ? 'text-blue-500' : 'text-zinc-500'} hover:text-blue-500 transition-colors">
                                <i data-lucide="chevron-up" class="w-4 h-4"></i>
                            </button>
                            <span class="text-xs font-mono font-bold ${g.votes >= 0 ? 'text-blue-400' : 'text-red-400'} min-w-[1.5rem] text-center">${g.votes}</span>
                            <button onclick="vote('${g.title}', -1)" class="${userVote === -1 ? 'text-red-500' : 'text-zinc-500'} hover:text-red-500 transition-colors">
                                <i data-lucide="chevron-down" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');
            lucide.createIcons();
        }

        function setCategory(cat) {
            currentCategory = cat;
            render();
        }

        function vote(title, delta) {
            const game = GAMES.find(g => g.title === title);
            if (game) {
                const currentVote = userVotes[title] || 0;
                
                if (currentVote === delta) {
                    // Toggle off
                    game.votes -= delta;
                    delete userVotes[title];
                } else if (currentVote === 0) {
                    // New vote
                    game.votes += delta;
                    userVotes[title] = delta;
                } else {
                    // Switch vote
                    game.votes += (delta * 2);
                    userVotes[title] = delta;
                }
                
                // Save to localStorage
                const votesToSave = {};
                GAMES.forEach(g => {
                    if (g.votes !== 0) votesToSave[g.title] = g.votes;
                });
                localStorage.setItem('nexus_votes', JSON.stringify(votesToSave));
                localStorage.setItem('nexus_user_votes', JSON.stringify(userVotes));
                
                render();
            }
        }

        function play(url) {
            currentUrl = url;
            document.getElementById('game-iframe').src = url;
            document.getElementById('game-container').style.display = 'block';
            document.getElementById('main-ui').style.display = 'none';
        }

        function closeGame() {
            document.getElementById('game-iframe').src = '';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('main-ui').style.display = 'block';
        }

        function reloadGame() {
            const iframe = document.getElementById('game-iframe');
            if (iframe.src) {
                const url = iframe.src;
                iframe.src = '';
                iframe.src = url;
            }
        }

        checkAuth();
        render();
        lucide.createIcons();
    </script>
</body>
</html>
